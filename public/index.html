<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Quadratic</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <a href="/" class="brand">
        <span class="brand-mark">◳</span>
        <span class="brand-name">Quadratic</span>
      </a>
      <nav id="user-nav" class="user-nav" hidden>
        <a href="/auth/install" class="btn btn-ghost">Add repositories</a>
        <div class="user-chip">
          <img id="user-avatar" alt="" />
          <span id="user-login"></span>
        </div>
        <button id="logout-btn" class="btn btn-ghost">Sign out</button>
      </nav>
    </header>

    <main id="app">
      <div class="loading">Loading…</div>
    </main>

    <!-- Templates -->
    <template id="tpl-landing">
      <section class="hero">
        <h1>Track issues across your GitHub repositories.</h1>
        <p class="lede">
          A minimal issue tracker that connects directly to your repositories
          via a GitHub App. Sign in to get started.
        </p>
        <a href="/auth/login" class="btn btn-primary btn-lg">
          <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
            <path
              fill="currentColor"
              d="M12 .5a11.5 11.5 0 0 0-3.64 22.41c.58.11.79-.25.79-.56v-2c-3.2.7-3.88-1.36-3.88-1.36-.52-1.34-1.28-1.7-1.28-1.7-1.05-.72.08-.7.08-.7 1.16.08 1.78 1.2 1.78 1.2 1.03 1.77 2.7 1.26 3.36.96.1-.75.4-1.26.73-1.55-2.55-.29-5.24-1.28-5.24-5.69 0-1.26.45-2.29 1.19-3.1-.12-.3-.52-1.48.11-3.08 0 0 .98-.31 3.2 1.18a11.06 11.06 0 0 1 5.82 0c2.22-1.49 3.2-1.18 3.2-1.18.63 1.6.23 2.78.11 3.08.74.81 1.19 1.84 1.19 3.1 0 4.42-2.7 5.39-5.27 5.68.41.36.78 1.06.78 2.14v3.18c0 .31.21.68.8.56A11.5 11.5 0 0 0 12 .5Z"
            />
          </svg>
          Sign in with GitHub
        </a>
        <ul class="bullets">
          <li>One-click sign in with your GitHub account</li>
          <li>Install the GitHub App on the repositories you want to track</li>
          <li>Create, update, and close issues from a clean, minimal UI</li>
        </ul>
      </section>
    </template>

    <template id="tpl-no-repos">
      <section class="empty">
        <h2>Connect a repository to get started</h2>
        <p>
          You're signed in, but no repositories are linked yet. Install the
          GitHub App on the repositories you'd like to track issues for.
        </p>
        <a href="/auth/install" class="btn btn-primary">Install on GitHub</a>
      </section>
    </template>

    <template id="tpl-dashboard">
      <section class="dashboard">
        <aside class="sidebar">
          <div class="sidebar-head">
            <h2>Repositories</h2>
            <a href="/auth/install" class="btn btn-ghost btn-sm" title="Add more">+</a>
          </div>
          <ul id="repo-list" class="repo-list"></ul>
        </aside>

        <section class="content">
          <header class="content-head">
            <div>
              <h2 id="active-repo-name"></h2>
              <p id="active-repo-meta" class="muted"></p>
            </div>
            <div class="content-actions">
              <select id="status-filter" class="input">
                <option value="">All statuses</option>
                <option value="OPEN">Open</option>
                <option value="IN_PROGRESS">In progress</option>
                <option value="CLOSED">Closed</option>
              </select>
              <button id="new-issue-btn" class="btn btn-primary">New issue</button>
            </div>
          </header>

          <ul id="issue-list" class="issue-list"></ul>
        </section>
      </section>
    </template>

    <template id="tpl-issue-card">
      <li class="issue-card">
        <div class="issue-main">
          <div class="issue-header">
            <span class="status-dot" data-status></span>
            <h3 class="issue-title" data-title></h3>
          </div>
          <p class="issue-desc" data-desc></p>
          <p class="issue-meta muted">
            <span data-author></span> ·
            <span data-created></span>
          </p>
        </div>
        <div class="issue-actions">
          <select class="input input-sm" data-status-select>
            <option value="OPEN">Open</option>
            <option value="IN_PROGRESS">In progress</option>
            <option value="CLOSED">Closed</option>
          </select>
          <button class="btn btn-ghost btn-sm" data-edit>Edit</button>
          <button class="btn btn-danger btn-sm" data-delete>Delete</button>
        </div>
      </li>
    </template>

    <!-- Modal -->
    <div id="modal" class="modal" hidden>
      <div class="modal-card">
        <header class="modal-head">
          <h3 id="modal-title"></h3>
          <button id="modal-close" class="btn btn-ghost btn-sm" aria-label="Close">×</button>
        </header>
        <form id="issue-form">
          <label>
            Title
            <input id="issue-title-input" class="input" required maxlength="255" />
          </label>
          <label>
            Description
            <textarea id="issue-desc-input" class="input" rows="6"></textarea>
          </label>
          <div id="issue-status-row" class="form-row" hidden>
            <label>
              Status
              <select id="issue-status-input" class="input">
                <option value="OPEN">Open</option>
                <option value="IN_PROGRESS">In progress</option>
                <option value="CLOSED">Closed</option>
              </select>
            </label>
          </div>
          <div class="modal-actions">
            <button type="button" id="cancel-btn" class="btn btn-ghost">Cancel</button>
            <button type="submit" id="save-btn" class="btn btn-primary">Save</button>
          </div>
        </form>
      </div>
    </div>

    <div id="toast" class="toast" hidden></div>

    <script src="/app.js"></script>
  </body>
</html>
